<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status do seu veículo</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Figtree',sans-serif;background:#F4F2EE;color:#111}
:root{--brand:#E8610A;--brand-l:#FEF0E7;--ok:#1B7A3E;--ok-bg:#E6F5EC;--warn:#A05C00;--warn-bg:#FFF3DC;--danger:#C0281E;--danger-bg:#FDECEA;--surface:#fff;--border:#E2DDD7;--t2:#555048;--t3:#97918A}
.header{background:#111;padding:20px 20px 0;position:relative;overflow:hidden}
.header::after{content:'🚗';position:absolute;right:-12px;bottom:-20px;font-size:96px;opacity:.07}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.logo-icon{width:32px;height:32px;background:var(--brand);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:15px;font-weight:700;color:#fff}
.hero-name{font-size:24px;font-weight:700;color:#fff;margin-bottom:4px}
.hero-car{font-size:15px;color:rgba(255,255,255,.5);margin-bottom:20px}
.status-pill-wrap{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border-radius:14px 14px 0 0;padding:14px 16px;margin:0 -20px}
.spill{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:6px 14px;border-radius:99px}
.spill.ok{background:var(--ok-bg);color:var(--ok)}
.spill.warn{background:var(--warn-bg);color:var(--warn)}
.spill.danger{background:var(--danger-bg);color:var(--danger)}
.spill.gray{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
.spill.blue{background:#E8F3FC;color:#1A6FA8}
.spill.purple{background:#F0EAF8;color:#6B3FA0}
.delivery-tag{margin-left:auto;font-size:12px;color:rgba(255,255,255,.4)}
.delivery-tag.late{color:#FC8181}
.container{max-width:560px;margin:0 auto;padding:20px}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:14px}
.section-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.section-head h2{font-size:14px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.04em}
.section-body{padding:16px}
.progress-wrap{padding:14px 16px;background:var(--surface);border-radius:14px;margin-bottom:14px;border:1px solid var(--border)}
.pbar{height:8px;background:#EAE7E2;border-radius:99px;overflow:hidden}
.pfill{height:100%;border-radius:99px;background:var(--brand);transition:width .5s}
.pfill.done{background:var(--ok)}
.prog-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px}
.tl-item{display:flex;gap:14px;padding-bottom:18px}
.tl-item:last-child{padding-bottom:0}
.tl-left{display:flex;flex-direction:column;align-items:center;width:28px}
.tl-dot{width:28px;height:28px;border-radius:50%;border:2.5px solid #E2DDD7;background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.tl-dot.done{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.tl-dot.active{border-color:var(--brand);background:var(--brand-l);color:var(--brand)}
.tl-line{width:2px;flex:1;background:#E2DDD7;margin-top:3px}
.tl-line.done{background:var(--ok)}
.tl-name{font-size:15px;font-weight:600;margin-bottom:3px}
.tl-sub{font-size:12px;color:var(--t3)}
.tl-sub.late{color:var(--danger);font-weight:600}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-tile{background:#F4F2EE;border-radius:10px;padding:12px 14px}
.info-tile-l{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.info-tile-v{font-size:14px;font-weight:600}
footer{text-align:center;padding:24px;color:var(--t3);font-size:12px;border-top:1px solid var(--border);margin-top:8px}
footer a{color:var(--brand);text-decoration:none;font-weight:600}
.loading{display:flex;align-items:center;justify-content:center;min-height:50vh;flex-direction:column;gap:12px;color:var(--t3)}
.loading-icon{font-size:40px;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="loading-icon">🔧</div>
  <div>Carregando status do veículo...</div>
</div>

<div id="app" style="display:none"></div>

<footer>Powered by <a href="#">OficinaPro</a></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
  'https://ovoccbtgvpjhhaklmabs.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92b2NjYnRndnBqaGhha2xtYWJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDU2MDYsImV4cCI6MjA5MDM4MTYwNn0.0PC7AeEphla2mRjUxbG5Pgg17nZI8Kqadj_ZMcYHxws'
);

const STATUS_MAP = {
  aguardando:{icon:'🕐',name:'Aguardando início',color:'gray'},
  andamento: {icon:'🔩',name:'Em andamento',     color:'warn'},
  lixamento: {icon:'⚙️',name:'Lixamento',         color:'purple'},
  pintura:   {icon:'🎨',name:'Pintura',            color:'blue'},
  finalizado:{icon:'✅',name:'Pronto!',            color:'ok'},
  entregue:  {icon:'🎉',name:'Entregue',           color:'ok'},
};

function today(){ return new Date().toISOString().split('T')[0] }
function fmtDate(d){ if(!d)return'—'; const[y,m,day]=d.split('-'); return`${day}/${m}/${y}` }
function isLate(prazo,status){ return prazo&&prazo<today()&&status!=='finalizado'&&status!=='entregue' }
function getStatusInfo(id){ return STATUS_MAP[id]||{icon:'🔧',name:id,color:'gray'} }

function render(v){
  const st=getStatusInfo(v.status); const late=isLate(v.prazo,v.status);
  const svcs=(v.servicos||[]).sort((a,b)=>a.ordem-b.ordem);
  const done=svcs.filter(s=>s.status==='finalizado').length;
  const pct=svcs.length?Math.round((done/svcs.length)*100):0;
  const oficina=v.oficinas||{};

  const tl=svcs.map((s,i)=>{
    const isDone=s.status==='finalizado'; const isActive=s.status==='andamento';
    const isLast=i===svcs.length-1; const sLate=isLate(s.data_fim,s.status);
    return`<div class="tl-item">
      <div class="tl-left">
        <div class="tl-dot ${isDone?'done':isActive?'active':''}">${isDone?'✓':isActive?'▶':'○'}</div>
        ${!isLast?`<div class="tl-line ${isDone?'done':''}"></div>`:''}
      </div>
      <div style="flex:1;padding-top:4px">
        <div class="tl-name">${s.nome_servico}</div>
        <div class="tl-sub ${sLate?'late':''}">
          ${isDone?`✅ Concluído em ${fmtDate(s.data_fim)}`:isActive?`🔩 Em andamento — Prazo: ${fmtDate(s.data_fim)}`:sLate?`⚠️ Atrasado (prazo era ${fmtDate(s.data_fim)})` :`🕐 Aguardando — Previsão: ${fmtDate(s.data_fim)}`}
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML=`
    <div class="header">
      <div class="logo"><div class="logo-icon">🔧</div><div class="logo-text">${oficina.nome||'OficinaPro'}</div></div>
      <div class="hero-name">${v.nome_cliente}</div>
      <div class="hero-car">${v.veiculo}${v.placa?' · '+v.placa:''}</div>
      <div class="status-pill-wrap">
        <span class="spill ${late?'danger':st.color}">${st.icon} ${st.name}</span>
        <span class="delivery-tag ${late?'late':''}">${late?'⚠️ Atrasado':'📅 Entrega:'} ${fmtDate(v.prazo)}</span>
      </div>
    </div>
    <div class="container">
      ${svcs.length?`<div class="progress-wrap"><div class="prog-label"><span>Progresso geral</span><strong>${pct}%</strong></div><div class="pbar"><div class="pfill ${pct===100?'done':''}" style="width:${pct}%"></div></div></div>`:''}
      <div class="section-card">
        <div class="section-head"><span style="font-size:16px">🗂️</span><h2>Etapas do serviço</h2></div>
        <div class="section-body">${svcs.length?`<div>${tl}</div>`:'<div style="color:var(--t3);font-size:13px;text-align:center;padding:8px">Nenhuma etapa registrada ainda.</div>'}</div>
      </div>
      <div class="section-card">
        <div class="section-head"><span style="font-size:16px">ℹ️</span><h2>Informações</h2></div>
        <div class="section-body">
          <div class="info-grid">
            <div class="info-tile"><div class="info-tile-l">Entrada</div><div class="info-tile-v">${fmtDate(v.created_at?.split('T')[0])}</div></div>
            <div class="info-tile"><div class="info-tile-l">Previsão</div><div class="info-tile-v" style="${late?'color:var(--danger)':''}">${fmtDate(v.prazo)}</div></div>
            ${oficina.telefone?`<div class="info-tile" style="grid-column:1/-1"><div class="info-tile-l">Telefone da oficina</div><div class="info-tile-v">${oficina.telefone}</div></div>`:''}
          </div>
        </div>
      </div>
    </div>`;
}

(async()=>{
  const params=new URLSearchParams(window.location.search);
  const id=params.get('id');
  if(!id){
    document.getElementById('loading').innerHTML='<p style="color:#ef4444">Link inválido. Verifique o link enviado pela oficina.</p>';
    return;
  }

  const { data, error } = await sb.from('veiculos')
    .select('*, servicos(*), oficinas(nome, telefone)')
    .eq('id', id)
    .single();

  document.getElementById('loading').style.display='none';

  if(error||!data){
    document.getElementById('app').style.display='block';
    document.getElementById('app').innerHTML='<div style="text-align:center;padding:60px;color:#ef4444">Veículo não encontrado. Verifique o link.</div>';
    return;
  }

  document.getElementById('app').style.display='block';
  render(data);
})();
</script>
</body>
</html>
